services:
  - type: web
    name: quickpark-api
    runtime: docker                  # .NET requires Docker on Render
    region: singapore                # closest to India
    plan: free
    rootDir: backend                 # path from repo root where Dockerfile lives
    dockerfilePath: ./Dockerfile     # relative to rootDir
    healthCheckPath: /api/health

    envVars:
      # ── Database (auto-linked from the PostgreSQL add-on below) ─────────────
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: quickpark-db
          property: connectionString

      # ── JWT Secret ──────────────────────────────────────────────────────────
      - key: Jwt__Secret
        generateValue: true          # Render generates a secure random string

      # ── Admin seed password ─────────────────────────────────────────────────
      # !! DO NOT put the real value here — this file goes to GitHub !!
      # After Render creates the service, go to:
      # Render Dashboard → quickpark-api → Environment → Add Variable
      # Key: AdminPassword   Value: <your-real-password>
      - key: AdminPassword
        sync: false              # tells Render: "I'll set this manually in the dashboard"


      # ── CORS: Vercel frontend URL ───────────────────────────────────────────
      - key: FrontendUrl
        value: https://quickparkproject-parkingmanagements-sigma.vercel.app

      # ── ASP.NET environment ─────────────────────────────────────────────────
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

databases:
  - name: quickpark-db
    databaseName: quickpark
    plan: free
    region: singapore
